<div class="login-container">

  <!-- LEFT SIDE - BRANDING -->
  <div class="login-left">
    <div class="left-content">
      <!-- Pour le lien Home, utilisez routerLink également -->
      <a routerLink="/" class="back-home">
        <svg class="back-icon" viewBox="0 0 24 24" width="20" height="20">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/>
        </svg>
        Home
      </a>
      
      <div class="brand">
        <span class="brand-icon">🇹🇳</span>
        <h1>InvestPlatform</h1>
      </div>
      
      <h2 class="welcome-title">Welcome Back</h2>
      <p class="welcome-text">Sign in to your account</p>
    </div>
  </div>

  <!-- RIGHT SIDE - LOGIN FORM -->
  <div class="login-right">
    <div class="login-card">
      
      <div class="card-header">
        <h2>Sign In</h2>
        <p class="subtitle">Enter your credentials</p>
      </div>

      <div class="error-message" *ngIf="errorMsg">
        <span class="error-icon">⚠️</span>
        <span>{{ errorMsg }}</span>
      </div>

      <!-- FORM -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">

        <!-- Champ Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="your@email.com"
            required
            autocomplete="off"
          />
        </div>

        <!-- Champ Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="new-password"
            />
            <button 
              type="button" 
              class="password-toggle" 
              (click)="togglePassword()"
            >
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
        </div>

        <!-- REMEMBER ME & FORGOT PASSWORD -->
        <div class="form-options">
          <label class="checkbox-container">
            <input 
              type="checkbox" 
              [(ngModel)]="rememberMe" 
              name="remember"
            />
            <span class="checkmark"></span>
            <span class="checkbox-label">Remember me</span>
          </label>
          
          <!-- ✅ LIEN VERS FORGOT PASSWORD AVEC ROUTERLINK -->
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Champ caché pour tromper le navigateur -->
        <input type="text" style="display:none" aria-hidden="true" />
        <input type="password" style="display:none" aria-hidden="true" />

        <!-- Submit Button -->
        <button type="submit" class="submit-button" [disabled]="loading">
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="loading-spinner">
            <span class="spinner"></span>
            Signing in...
          </span>
        </button>

      </form>

      <div class="login-footer">
        <p>© 2025 InvestPlatform</p>
      </div>

    </div>
  </div>

</div>
