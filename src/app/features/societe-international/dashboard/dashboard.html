<div class="dashboard-container">
  <app-navbar></app-navbar>
  <main class="dashboard-content">

    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h1>International Company Dashboard</h1>
        <p>Manage your collaborations and investments.</p>
      </div>
      <app-notification-bell></app-notification-bell>
    </div>

    <div class="stats-cards">
      <div class="stat-card">
        <h3>Collaboration Services</h3>
        <p class="stat-number">{{ collaborationCount }}</p>
      </div>
      <div class="stat-card">
        <h3>Investment Services</h3>
        <p class="stat-number">{{ investmentCount }}</p>
      </div>
      <div class="stat-card">
        <h3>Unread Messages</h3>
        <p class="stat-number">{{ unreadCount }}</p>
      </div>
    </div>
  </main>
</div>
